aid: the-odds-api
name: The Odds API
description: >-
  The Odds API provides sports betting odds from over 40 major bookmakers worldwide.
  Access current and historical odds for head-to-head, spreads, totals, and outrights
  markets across 100+ sports. Endpoints cover live scores, event listings, participants,
  and historical odds snapshots dating back to June 2020. Quota is consumed per request
  based on the number of regions and markets requested. All requests require an API key.
type: Contract
position: Consumer
access: 3rd-Party
