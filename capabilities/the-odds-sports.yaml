naftiko: 1.0.0-alpha2
info:
  label: The Odds API — Sports
  description: 'The Odds API — Sports. 1 operations. Lead operation: Get Available Sports. Self-contained Naftiko capability
    covering one The Odds Api business surface.'
  tags:
  - The Odds Api
  - Sports
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    THE_ODDS_API_API_KEY: THE_ODDS_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: the-odds-sports
    baseUri: https://api.the-odds-api.com
    description: The Odds API — Sports business capability. Self-contained, no shared references.
    resources:
    - name: v4-sports
      path: /v4/sports
      operations:
      - name: getsports
        method: GET
        description: Get Available Sports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiKey
          in: query
          type: string
          description: Your API key.
          required: true
        - name: all
          in: query
          type: boolean
          description: When true, includes out-of-season sports in the response.
    authentication:
      type: apikey
      key: apiKey
      value: '{{env.THE_ODDS_API_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: the-odds-sports-rest
    port: 8080
    description: REST adapter for The Odds API — Sports. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v4/sports
      name: v4-sports
      description: REST surface for v4-sports.
      operations:
      - method: GET
        name: getsports
        description: Get Available Sports
        call: the-odds-sports.getsports
        with:
          apiKey: rest.apiKey
          all: rest.all
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: the-odds-sports-mcp
    port: 9090
    transport: http
    description: MCP adapter for The Odds API — Sports. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-available-sports
      description: Get Available Sports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: the-odds-sports.getsports
      with:
        apiKey: tools.apiKey
        all: tools.all
      outputParameters:
      - type: object
        mapping: $.
